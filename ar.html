<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Navigasyon</title>

    <!--
        A-Frame 1.4.1
        referenceSpaceType: local  (local-floor bazı cihazlarda session'ı öldürür)
        Oklar kamera yüksekliğine göre dinamik yerleştirilir.
    -->
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --accent:     #81D4FA;
            --accent-dim: rgba(129,212,250,0.15);
            --bg:         #0D1117;
            --glass:      rgba(13,17,23,0.88);
            --border:     rgba(129,212,250,0.25);
            --text:       #E6EDF3;
            --muted:      #768390;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        a-scene {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
        }

        /* ════════════════════════════════════════════
           OVERLAY — pointer-events: none → A-Frame'i bloklamaz
           İçindeki interaktif elemanlar kendi pointer-events'ini açar
        ════════════════════════════════════════════ */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ── Üst Bilgi Barı ──────────────────────── */
        #info-bar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .bar-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        #instruction-text {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
        }

        .distance-box {
            text-align: right;
            flex-shrink: 0;
        }

        #dist-num {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 24px rgba(129,212,250,0.6);
            font-variant-numeric: tabular-nums;
        }

        .dist-unit {
            font-size: 0.72rem;
            color: var(--muted);
            text-align: right;
        }

        /* Bacak ilerleme çizgisi */
        #leg-dots {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .leg-dot {
            height: 3px;
            flex: 1;
            border-radius: 2px;
            background: rgba(255,255,255,0.12);
            transition: background 0.4s;
        }
        .leg-dot.done    { background: var(--accent); }
        .leg-dot.current { background: var(--accent); opacity: 0.55; }

        /* ── "Noktaya Vardım" Butonu ─────────────── */
        #arrived-btn {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 360px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: none;
            pointer-events: auto;
            box-shadow: 0 6px 24px rgba(129,212,250,0.35);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s, opacity 0.15s;
        }

        #arrived-btn:active { transform: translateX(-50%) scale(0.96); }

        /* ════════════════════════════════════════════
           BAŞLANGIÇ / ARA EKRANI
        ════════════════════════════════════════════ */
        #start-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            z-index: 2000;
            background-image: radial-gradient(ellipse 80% 50% at 50% 0%,
                rgba(129,212,250,0.07) 0%, transparent 70%);
        }

        .dest-badge    { font-size: 3rem; margin-bottom: 4px; }
        .screen-title  { font-size: 1.4rem; font-weight: 700; color: var(--text); text-align: center; }
        .screen-sub    { font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.5; }

        .step-card {
            width: 100%;
            max-width: 360px;
            background: var(--accent-dim);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            margin-top: 8px;
        }

        .step-card-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .step-card-text {
            font-size: 1rem;
            font-weight: 600;
        }

        #begin-btn {
            width: 100%;
            max-width: 360px;
            padding: 18px;
            font-size: 1.05rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 6px 24px rgba(129,212,250,0.3);
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #begin-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        #begin-btn:not(:disabled):active { opacity: 0.85; }

        #back-link {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            padding: 8px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        /* ════════════════════════════════════════════
           BİLGİ EKRANI (Info Leg — asansör vb.)
        ════════════════════════════════════════════ */
        #info-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 32px 24px;
            z-index: 2000;
            background-image: radial-gradient(ellipse 80% 50% at 50% 0%,
                rgba(129,212,250,0.07) 0%, transparent 70%);
        }

        .info-icon  { font-size: 4rem; }
        .info-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
        }

        .info-lines {
            width: 100%;
            max-width: 360px;
            background: var(--accent-dim);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-line {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .info-step-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            font-size: 0.72rem;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        #continue-btn {
            width: 100%;
            max-width: 360px;
            padding: 18px;
            font-size: 1.05rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(129,212,250,0.3);
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s;
        }

        #continue-btn:active { opacity: 0.85; }

        /* ════════════════════════════════════════════
           TAMAMLANDI EKRANI
        ════════════════════════════════════════════ */
        #done-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            z-index: 2000;
        }

        .done-icon  { font-size: 4rem; }
        .done-title { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
        .done-sub   { font-size: 0.9rem; color: var(--muted); text-align: center; }

        #home-btn {
            margin-top: 16px;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }

        /* ── Filigran ───────────────────────────── */
        .watermark {
            position: fixed;
            bottom: 8px; right: 10px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.12);
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- ═══ BAŞLANGIÇ / ARA EKRANI ══════════════════════ -->
    <div id="start-screen">
        <div class="dest-badge" id="ss-icon">🏥</div>
        <div class="screen-title" id="ss-title">AR Navigasyon</div>
        <div class="screen-sub"  id="ss-sub">Yükleniyor...</div>

        <div class="step-card">
            <div class="step-card-label" id="ss-leg-label">Adım 1</div>
            <div class="step-card-text"  id="ss-instruction">—</div>
        </div>

        <button id="begin-btn" disabled>⏳ Hazırlanıyor...</button>

        <a href="index.html" id="back-link">← Geri Dön</a>
    </div>

    <!-- ═══ BİLGİ EKRANI (Info Leg) ══════════════════════ -->
    <div id="info-screen">
        <div class="info-icon"  id="info-icon">🛗</div>
        <div class="info-title" id="info-title">Bilgi</div>
        <div class="info-lines" id="info-lines"></div>
        <button id="continue-btn" onclick="onContinue()">Devam Et →</button>
    </div>

    <!-- ═══ TAMAMLANDI EKRANI ════════════════════════════ -->
    <div id="done-screen">
        <div class="done-icon">🎉</div>
        <div class="done-title" id="done-dest">Hedefe Ulaştınız!</div>
        <div class="done-sub"   id="done-name"></div>
        <button id="home-btn" onclick="goHome()">Ana Sayfaya Dön</button>
    </div>

    <!-- ═══ A-FRAME SAHNESİ ══════════════════════════════
         renderer alpha:true  → WebGL canvas saydam
         referenceSpaceType: local → daha geniş cihaz desteği
         dom-overlay → UI katmanını AR'ye bindirme
    ════════════════════════════════════════════════════ -->
    <a-scene
        webxr="referenceSpaceType: local;
               requiredFeatures: local;
               optionalFeatures: dom-overlay,hit-test;
               overlayElement: #overlay;"
        renderer="alpha: true; antialias: true;"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false">

        <a-camera
            id="cam"
            position="0 1.6 0"
            look-controls="enabled: false"
            wasd-controls="enabled: false">
        </a-camera>

        <a-entity id="arrows"></a-entity>

    </a-scene>

    <!-- ═══ AR OVERLAY UI ════════════════════════════════ -->
    <div id="overlay">
        <div id="info-bar">
            <div class="bar-top">
                <div id="instruction-text">İlerleyiniz</div>
                <div class="distance-box">
                    <div id="dist-num">--</div>
                    <div class="dist-unit">metre</div>
                </div>
            </div>
            <div id="leg-dots"></div>
        </div>

        <button id="arrived-btn" onclick="onArrived()">✅ Noktaya Vardım</button>
    </div>

    <div class="watermark">by Arda24</div>

    <!-- ═══════════════════════════════════════════════════
         ANA NAVIGASYON MOTORU
    ════════════════════════════════════════════════════ -->
    <script>

    /* ──────────────────────────────────────────────────────
       ROTA VERİSİ
       config.js'deki NAV_ROUTES dizisinden ID ile bul.
    ────────────────────────────────────────────────────── */
    const urlParams = new URLSearchParams(window.location.search);
    const targetId  = urlParams.get('hedef')
                   || sessionStorage.getItem('ar_hedef')
                   || (NAV_ROUTES[0] && NAV_ROUTES[0].id);

    const route = NAV_ROUTES.find(r => r.id === targetId);

    if (!route) {
        // Rota bulunamadı → ana sayfaya dön
        window.location.href = 'index.html';
    }

    const legs = route.legs;
    let legIdx    = 0;
    let arActive  = false;
    let tickRafId = null;

    /* ── DOM Referansları ─────────────────────────────── */
    const startScreen   = document.getElementById('start-screen');
    const infoScreen    = document.getElementById('info-screen');
    const doneScreen    = document.getElementById('done-screen');
    const beginBtn      = document.getElementById('begin-btn');
    const infoBar       = document.getElementById('info-bar');
    const arrivedBtn    = document.getElementById('arrived-btn');
    const instructionEl = document.getElementById('instruction-text');
    const distNumEl     = document.getElementById('dist-num');
    const legDotsEl     = document.getElementById('leg-dots');
    const arrowsEl      = document.getElementById('arrows');
    const sceneEl       = document.querySelector('a-scene');
    const camEl         = document.getElementById('cam');

    /* ──────────────────────────────────────────────────────
       BAŞLANGIÇ EKRANINI DOLDUR
       Sıradaki bacağa göre içeriği günceller.
       info tipi bacaklar başlangıç ekranında değil,
       kendi info-screen'inde gösterilir.
    ────────────────────────────────────────────────────── */
    function fillStartScreen() {
        // Bir sonraki AR tipi bacağı bul (info'yu atla)
        const leg = legs[legIdx];

        document.getElementById('ss-icon').textContent  = route.icon;
        document.getElementById('ss-title').textContent = route.name;
        document.getElementById('ss-sub').textContent   =
            `Adım ${legIdx + 1} / ${legs.length}`;

        if (leg.type === 'info') {
            // Info bacakları doğrudan bilgi ekranına yönlendir
            document.getElementById('ss-leg-label').textContent   = `ℹ️ Bilgi`;
            document.getElementById('ss-instruction').textContent = leg.title;
        } else {
            document.getElementById('ss-leg-label').textContent   = `Adım ${legIdx + 1}`;
            document.getElementById('ss-instruction').textContent = leg.instruction;
        }

        arrivedBtn.textContent = (legIdx === legs.length - 1)
            ? '🎉 Hedefe Vardım!'
            : '✅ Noktaya Vardım';
    }

    fillStartScreen();

    /* ── Bacak ilerleme noktalarını çiz ─────────────────── */
    function buildDots() {
        legDotsEl.innerHTML = '';
        legs.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'leg-dot'
                + (i < legIdx ? ' done' : i === legIdx ? ' current' : '');
            legDotsEl.appendChild(d);
        });
    }

    /* ──────────────────────────────────────────────────────
       AR DESTEK KONTROLÜ
    ────────────────────────────────────────────────────── */
    function enableBeginBtn() {
        if (legs[legIdx] && legs[legIdx].type === 'info') {
            // Info bacakta AR butonu yerine bilgi ekranı aç
            beginBtn.textContent = '📋 Talimatları Gör';
            beginBtn.disabled    = false;
        } else {
            beginBtn.textContent = '🚀 AR\'yi Başlat';
            beginBtn.disabled    = false;
        }
    }

    if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then(ok => {
            enableBeginBtn();
        }).catch(() => {
            enableBeginBtn();
        });
    } else {
        // WebXR yok — yine de dene (AR olmayan cihazlarda test için)
        enableBeginBtn();
        beginBtn.textContent = '📱 Başlat';
    }

    /* ── Başlat Butonu ────────────────────────────────────── */
    beginBtn.addEventListener('click', () => {
        const leg = legs[legIdx];

        if (leg.type === 'info') {
            // Info bacak → bilgi ekranını aç
            showInfoScreen(leg);
            return;
        }

        // AR bacak → AR oturumu başlat
        if (!sceneEl.hasLoaded) {
            sceneEl.addEventListener('loaded', enterAR, { once: true });
            return;
        }
        enterAR();
    });

    /* ──────────────────────────────────────────────────────
       BİLGİ EKRANI (Info Leg)
    ────────────────────────────────────────────────────── */
    function showInfoScreen(leg) {
        startScreen.style.display = 'none';

        document.getElementById('info-icon').textContent  = leg.icon  || 'ℹ️';
        document.getElementById('info-title').textContent = leg.title || 'Bilgi';

        const linesEl = document.getElementById('info-lines');
        linesEl.innerHTML = '';
        (leg.lines || []).forEach((line, i) => {
            const row = document.createElement('div');
            row.className = 'info-line';
            row.innerHTML = `<div class="info-step-num">${i + 1}</div><span>${line}</span>`;
            linesEl.appendChild(row);
        });

        infoScreen.style.display = 'flex';
    }

    /* "Devam Et" butonuna basıldı — info bacağını tamamla */
    window.onContinue = function () {
        infoScreen.style.display = 'none';
        legIdx++;

        if (legIdx < legs.length) {
            fillStartScreen();
            enableBeginBtn();
            startScreen.style.display = 'flex';
        } else {
            showDone();
        }
    };

    /* ──────────────────────────────────────────────────────
       AR OTURUMU BAŞLAT
    ────────────────────────────────────────────────────── */
    function enterAR() {
        sceneEl.enterAR();
    }

    /* ── A-Frame: AR açıldı ──────────────────────────────── */
    sceneEl.addEventListener('enter-vr', () => {
        arActive = true;
        document.body.style.background = 'transparent';

        startScreen.style.display = 'none';
        infoScreen.style.display  = 'none';

        infoBar.style.display    = 'block';
        arrivedBtn.style.display = 'block';
        buildDots();

        const leg = legs[legIdx];
        instructionEl.textContent = leg.instruction || '';

        /*
         * DONMA SORUNUNUN ÇÖZÜMÜ:
         * A-Frame'in WebXR referans alanını kurması için 2 sn bekle.
         * Bu gecikme olmadan kamera pozisyonu (0,0,0) gelir ve
         * oklar kameranın içinde kalır → görünmez.
         */
        setTimeout(drawArrows, 2000);
    });

    /* ── A-Frame: AR kapandı ─────────────────────────────── */
    sceneEl.addEventListener('exit-vr', () => {
        arActive = false;
        document.body.style.background = '';
        cancelAnimationFrame(tickRafId);
        infoBar.style.display    = 'none';
        arrivedBtn.style.display = 'none';
    });

    /* ──────────────────────────────────────────────────────
       OKLARI ÇİZ
       Yönlendirilmiş elmas şekilli işaretler.
       Dalga (cascade) animasyonu ile akan yol efekti.
    ────────────────────────────────────────────────────── */
    function drawArrows() {
        if (!arActive) return;

        arrowsEl.innerHTML = '';

        const cam = camEl.object3D;
        const leg = legs[legIdx];

        if (!leg || !leg.path) return;

        /* Kamera konumu ve yaw açısını al */
        const camPos = new THREE.Vector3();
        cam.getWorldPosition(camPos);

        const euler = new THREE.Euler().setFromQuaternion(cam.quaternion, 'YXZ');

        arrowsEl.object3D.position.set(camPos.x, camPos.y, camPos.z);
        arrowsEl.object3D.rotation.set(0, euler.y, 0);

        leg.path.forEach((point, i) => {
            const parts = point.pos.split(' ').map(Number);
            const x = parts[0];
            const z = parts[2];
            /* Oku zemine yakın göster: kamera Y'sinden 0.9m aşağı */
            const y = -0.9;

            /* ── 1. Dış Halka (beyaz, ince) ────────────────── */
            const ring = document.createElement('a-torus');
            ring.setAttribute('radius',       '0.16');
            ring.setAttribute('radius-tubular','0.012');
            ring.setAttribute('segments-tubular','20');
            ring.setAttribute('segments-radial','4');   // kare/elmas şekil
            ring.setAttribute('color',  '#FFFFFF');
            ring.setAttribute('position', `${x} ${y + 0.005} ${z}`);
            ring.setAttribute('rotation', '90 45 0');   // yere yatık + 45° döndür
            ring.setAttribute('material', 'opacity: 0.25; transparent: true; side: double;');
            arrowsEl.appendChild(ring);

            /* ── 2. İç Elmas (renkli dolgu) ─────────────────── */
            const diamond = document.createElement('a-cone');
            diamond.setAttribute('radius-bottom', '0.13');
            diamond.setAttribute('radius-top',    '0');
            diamond.setAttribute('height',        '0.05');
            diamond.setAttribute('segments-radial','4');        // elmas
            diamond.setAttribute('color', '#81D4FA');
            diamond.setAttribute('position', `${x} ${y} ${z}`);
            diamond.setAttribute('rotation', '-90 45 0');       // yere yatık
            diamond.setAttribute('material', 'opacity: 0.95; transparent: true; side: double;');

            /* Cascade dalga animasyonu */
            diamond.setAttribute('animation', [
                'property: material.opacity;',
                'from: 0.25; to: 1.0;',
                'dir: alternate;',
                `dur: 700;`,
                'loop: true;',
                `delay: ${i * 160};`,
                'easing: easeInOutSine;'
            ].join(' '));

            arrowsEl.appendChild(diamond);

            /* ── 3. Zemin Parlaması (alt glow) ──────────────── */
            const glow = document.createElement('a-plane');
            glow.setAttribute('width',  '0.28');
            glow.setAttribute('height', '0.28');
            glow.setAttribute('position', `${x} ${y - 0.02} ${z}`);
            glow.setAttribute('rotation', '-90 45 0');
            glow.setAttribute('color', '#81D4FA');
            glow.setAttribute('material', 'opacity: 0.08; transparent: true; side: double;');
            arrowsEl.appendChild(glow);
        });

        startDistanceTracking();
    }

    /* ──────────────────────────────────────────────────────
       MESAFE TAKİBİ
       2D kuşuçuşu mesafesi — Y ekseni yok sayılır.
    ────────────────────────────────────────────────────── */
    function startDistanceTracking() {
        cancelAnimationFrame(tickRafId);
        tick();
    }

    function tick() {
        if (!arActive) return;

        const cam      = camEl.object3D;
        const children = arrowsEl.children;

        /* Her ok noktası için 3 element (ring + diamond + glow) var.
           Son diamond'ı bul: sondan 2. (glow son, diamond ondan önce) */
        const lastDiamond = children[children.length - 2];

        if (!lastDiamond) { tickRafId = requestAnimationFrame(tick); return; }

        const camPos    = new THREE.Vector3();
        const targetPos = new THREE.Vector3();

        cam.getWorldPosition(camPos);
        lastDiamond.object3D.getWorldPosition(targetPos);

        const dist = Math.hypot(camPos.x - targetPos.x, camPos.z - targetPos.z);

        distNumEl.textContent = dist < 0.5 ? '0' : dist.toFixed(1);

        if (dist < 0.5) {
            instructionEl.textContent = '📍 Noktaya Ulaştınız!';
            distNumEl.textContent     = '0';
        }

        tickRafId = requestAnimationFrame(tick);
    }

    /* ──────────────────────────────────────────────────────
       NOKTAYA VARILDI — Sonraki bacağa geç
    ────────────────────────────────────────────────────── */
    window.onArrived = function () {
        cancelAnimationFrame(tickRafId);
        sceneEl.exitVR();

        legIdx++;

        if (legIdx < legs.length) {
            fillStartScreen();
            enableBeginBtn();

            const nextLeg = legs[legIdx];
            if (nextLeg.type === 'info') {
                // Doğrudan bilgi ekranını aç
                setTimeout(() => showInfoScreen(nextLeg), 300);
            } else {
                startScreen.style.display = 'flex';
            }
        } else {
            showDone();
        }
    };

    /* ── Tamamlandı Ekranı ─────────────────────────────── */
    function showDone() {
        doneScreen.style.display = 'flex';
        document.getElementById('done-dest').textContent = `${route.icon} Hedefe Ulaştınız!`;
        document.getElementById('done-name').textContent = route.name;
    }

    /* Ana sayfaya dön ve tamamlandı bilgisini ilet */
    window.goHome = function () {
        window.location.href = `index.html?done=${route.id}`;
    };

    </script>
</body>
</html>
