<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hastane AR Navigasyon</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="config.js"></script>
    <style>
        /* CSS Stilleri (Görselliği bozmadan korundu) */
        :root { --accent: #81D4FA; --bg: #121212; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; transition: background 0.3s; }
        #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #top-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px); border: 2px solid var(--accent); border-radius: 20px; padding: 15px; text-align: center; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .distance-text { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .instruction-text { font-size: 1rem; color: #E0E0E0; }
        #menu-btn { position: absolute; top: 25px; right: 20px; background: rgba(18, 18, 18, 0.9); border: 1px solid var(--accent); color: white; border-radius: 12px; padding: 10px 15px; cursor: pointer; font-size: 1.5rem; pointer-events: auto; display: none; }
        #menu-panel { display: none; position: absolute; top: 75px; right: 20px; width: 250px; background: rgba(18, 18, 18, 0.95); border: 1px solid #333; border-radius: 15px; pointer-events: auto; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .menu-action { width: 100%; padding: 12px; background: var(--accent); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #intro-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .instruction-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; max-width: 400px; width: 100%; }
        /* Özel Talimat Kutusu (Laboratuvar vb. için) */
        #special-instruction { color: #FFD54F; font-weight: bold; margin-bottom: 15px; display: none; background: rgba(255, 213, 79, 0.1); padding: 10px; border-radius: 8px; }
        
        #start-ar-btn { background: var(--accent); color: #000; font-size: 1.4rem; font-weight: bold; padding: 15px; border: none; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px; transition: background 0.3s; }
        #start-ar-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .watermark { position: fixed; bottom: 8px; right: 12px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.25); pointer-events: none; z-index: 10000; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="instruction-box">
            <h2 id="target-title" style="color: var(--accent); margin-top:0;">Navigasyon</h2>
            <!-- Asansör gibi özel durumlar için eklendi -->
            <div id="special-instruction"></div> 
            <p id="target-desc">Lütfen koridora düz bakın.</p>
            <button id="start-ar-btn">🚀 AR'yi Başlat</button>
        </div>
    </div>

    <div id="overlay-container">
        <div id="top-bar">
            <div class="instruction-text" id="ui-instruction">İlerleyiniz</div>
            <div class="distance-text"><span id="ui-distance">--</span> m</div>
        </div>

        <button id="menu-btn" onclick="toggleMenu()">☰</button>
        <div id="menu-panel">
            <div style="font-weight: bold; color: var(--accent); margin-bottom: 10px;">Rota İşlemleri</div>
            <button class="menu-action" id="next-leg-btn" onclick="handleLegComplete()">✅ Noktaya Vardım</button>
            <button onclick="window.location.href='index.html'" style="width:100%; margin-top:10px; padding:10px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer;">Menüye Dön</button>
        </div>
    </div>

    <a-scene 
        webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor; optionalFeatures: dom-overlay; overlayElement: #overlay-container;" 
        renderer="alpha: true; antialias: true;"
        vr-mode-ui="enabled: false">
        <a-camera id="user-camera" position="0 0 0"></a-camera>
        <a-entity id="route-container"></a-entity>
    </a-scene>

    <div class="watermark">by Arda24</div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            let targetId = urlParams.get('hedef') || NavigationState.getDestination() || 'noroloji';

            const routeData = NavConfig["durak1"].destinations[targetId];
            let currentLegIndex = 0;
            let routeLegs = routeData.legs;
            
            const sceneEl = document.querySelector('a-scene');
            const routeContainer = document.getElementById("route-container");
            const startBtn = document.getElementById("start-ar-btn");

            // "Hazırlanıyor" sorununu çözmek için basitleştirilmiş kontrol
            if (navigator.xr) {
                // Sadece xr objesi varsa butonu aktif et. Detaylı destek kontrolü beklemeyi uzatabiliyor.
                startBtn.disabled = false;
            } else {
                startBtn.innerText = "❌ WebXR Bulunamadı";
                document.getElementById("target-desc").innerText = "Lütfen Chrome üzerinden HTTPS ile giriş yapın.";
            }

            document.getElementById("target-title").innerText = routeData.name;
            updateIntroScreen();

            function updateIntroScreen() {
                const currentLeg = routeLegs[currentLegIndex];
                const specialInstEl = document.getElementById("special-instruction");
                
                // Eğer özel bir talimat (örn: asansöre binin) varsa göster
                if (currentLeg.specialInstruction) {
                    specialInstEl.innerText = currentLeg.specialInstruction;
                    specialInstEl.style.display = "block";
                } else {
                    specialInstEl.style.display = "none";
                }
                document.getElementById("target-desc").innerText = "Lütfen koridora düz bakın.";
            }

            window.toggleMenu = function() {
                const panel = document.getElementById("menu-panel");
                panel.style.display = panel.style.display === "block" ? "none" : "block";
            };

            window.handleLegComplete = function() {
                sceneEl.exitVR();
                window.toggleMenu();
                currentLegIndex++;

                if (currentLegIndex < routeLegs.length) {
                    alert("Noktaya varıldı. Lütfen yeni yöne dönüp AR'yi tekrar başlatın.");
                    updateIntroScreen();
                    document.getElementById("intro-screen").style.display = "flex";
                    document.body.style.background = "var(--bg)";
                    
                    if (currentLegIndex === routeLegs.length - 1) {
                        document.getElementById("next-leg-btn").innerText = "🎉 Hedefe Vardım";
                    }
                } else {
                    // Rota tamamen bittiğinde tamamlandı olarak işaretle
                    NavigationState.markCompleted(targetId);
                    alert("Tebrikler! " + routeData.name + " hedefine ulaştınız.");
                    window.location.href = "index.html";
                }
            };

            startBtn.addEventListener('click', () => {
                if (sceneEl.hasLoaded) {
                    sceneEl.systems.webxr.sessionConfiguration.mode = 'immersive-ar';
                    sceneEl.enterVR(); 
                } else {
                    alert("3D Motor hazırlanıyor, lütfen 1-2 saniye bekleyip tekrar deneyin.");
                }
            });

            sceneEl.addEventListener('enter-vr', () => {
                if (sceneEl.is('ar-mode')) {
                    document.body.style.background = "transparent";
                    document.getElementById("intro-screen").style.display = "none";
                    document.getElementById("top-bar").style.display = "block";
                    document.getElementById("menu-btn").style.display = "block";
                    
                    setTimeout(() => {
                        drawCurrentLeg();
                    }, 1000); // Bekleme süresini optimize ettik
                }
            });

            sceneEl.addEventListener('exit-vr', () => {
                document.body.style.background = "var(--bg)";
                document.getElementById("top-bar").style.display = "none";
                document.getElementById("menu-btn").style.display = "none";
                document.getElementById("menu-panel").style.display = "none";
            });

            function drawCurrentLeg() {
                routeContainer.innerHTML = "";
                const leg = routeLegs[currentLegIndex];
                document.getElementById("ui-instruction").innerText = leg.instruction;

                const cameraObj = document.querySelector('#user-camera').object3D;
                routeContainer.object3D.position.set(cameraObj.position.x, 0, cameraObj.position.z);
                const euler = new THREE.Euler().setFromQuaternion(cameraObj.quaternion, 'YXZ');
                routeContainer.object3D.rotation.set(0, euler.y, 0);

                leg.path.forEach((p, i) => {
                    // Düzeltilmiş Ok Tasarımı: Daha ince ve uzun, aerodinamik
                    const arrow = document.createElement('a-cone');
                    arrow.setAttribute('radius-bottom', '0.08'); // Tabanı daraltıldı
                    arrow.setAttribute('height', '0.06'); // Yüksekliği artırıldı
                    arrow.setAttribute('segments-radial', '6'); // Daha pürüzsüz
                    arrow.setAttribute('color', leg.color);
                    arrow.setAttribute('position', p.pos);
                    arrow.setAttribute('rotation', p.rot);
                    // Parlaklık/Şeffaflık animasyonu eklendi
                    arrow.setAttribute('material', 'opacity: 0.7; transparent: true;');
                    arrow.setAttribute('animation', `property: position; dir: alternate; dur: 1000; loop: true; to: ${p.pos.split(' ')[0]} ${parseFloat(p.pos.split(' ')[1]) + 0.02} ${p.pos.split(' ')[2]}; delay: ${i * 100};`);
                    routeContainer.appendChild(arrow);
                });
                startDistanceTracking();
            }

            function startDistanceTracking() {
                if (AFRAME.components['distance-tracker']) delete AFRAME.components['distance-tracker'];
                
                AFRAME.registerComponent('distance-tracker', {
                    tick: function () {
                        const camObj = document.querySelector('#user-camera').object3D;
                        const lastArrow = routeContainer.lastChild;
                        if (!lastArrow) return;
                        
                        const camWorldPos = new THREE.Vector3();
                        camObj.getWorldPosition(camWorldPos);
                        
                        const targetWorldPos = new THREE.Vector3();
                        lastArrow.getWorldPosition(targetWorldPos);
                        
                        const dist2D = Math.hypot(camWorldPos.x - targetWorldPos.x, camWorldPos.z - targetWorldPos.z);
                        
                        if (dist2D < 0.6) {
                            document.getElementById("ui-distance").innerText = "0";
                            document.getElementById("ui-instruction").innerText = "📍 Noktaya Yaklaştınız!";
                        } else {
                            document.getElementById("ui-distance").innerText = dist2D.toFixed(1);
                        }
                    }
                });
                sceneEl.setAttribute('distance-tracker', '');
            }
        });
    </script>
</body>
</html>
