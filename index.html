<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hastane AR Navigasyon</title>
    <script src="config.js"></script>
    <style>
        :root {
            --accent:      #81D4FA;
            --accent-dim:  rgba(129,212,250,0.12);
            --accent-glow: rgba(129,212,250,0.28);
            --bg:          #0D1117;
            --card:        #161C26;
            --card-done:   #0F1318;
            --card-locked: #12181F;
            --border:      rgba(129,212,250,0.2);
            --text:        #E6EDF3;
            --muted:       #6B7A8D;
            --done-text:   #3A4450;
            --radius:      16px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -10%; left: 50%;
            transform: translateX(-50%);
            width: 100vw; height: 50vh;
            background: radial-gradient(ellipse, rgba(129,212,250,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ─────────────────────────────── */
        header {
            position: relative; z-index: 1;
            padding: 52px 24px 20px;
            text-align: center;
        }

        .header-icon { font-size: 2.6rem; display: block; margin-bottom: 10px; }

        h1 { font-size: 1.45rem; font-weight: 700; margin-bottom: 4px; }

        .header-sub { font-size: 0.82rem; color: var(--muted); }

        /* AR Destek badge */
        #ar-badge {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 8px;
            margin: 4px 24px 20px;
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 0.78rem;
            background: rgba(255,255,255,0.03);
            color: var(--muted);
            transition: all 0.3s;
        }
        #ar-badge.ok   { background: rgba(129,212,250,0.09); color: var(--accent); border: 1px solid var(--border); }
        #ar-badge.fail { background: rgba(239,100,100,0.09); color: #F97583;       border: 1px solid rgba(239,100,100,0.3); }
        .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

        /* ── Görev İlerleme ─────────────────────── */
        .progress-bar-wrap {
            position: relative; z-index: 1;
            margin: 0 24px 20px;
            padding: 14px 16px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label span:first-child {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .progress-label span:last-child {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ── Kart Listesi ───────────────────────── */
        .section-label {
            position: relative; z-index: 1;
            padding: 0 24px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        #dest-list {
            position: relative; z-index: 1;
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 16px;
        }

        /* ─ Kart Base ─ */
        .dest-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px;
            background: var(--card);
            border: 1.5px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        /* Görev sıra çizgisi (sol kenar) */
        .dest-card::after {
            content: '';
            position: absolute;
            left: 0; top: 16px; bottom: 16px;
            width: 3px;
            border-radius: 0 2px 2px 0;
            background: transparent;
            transition: background 0.2s;
        }
        .dest-card.active-next::after { background: var(--accent); }

        /* Seçili kart parlama efekti */
        .dest-card.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .dest-card.selected::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .dest-card:active:not(.done):not(.locked) { opacity: 0.75; }

        /* ─ Tamamlanmış Kart ─ */
        .dest-card.done {
            cursor: default;
            background: var(--card-done);
            border-color: rgba(255,255,255,0.04);
            opacity: 0.45;
        }

        .dest-card.done .dest-name  { color: var(--done-text); }
        .dest-card.done .dest-desc  { color: var(--done-text); }
        .dest-card.done .dest-emoji { filter: grayscale(1); }

        /* ─ Kilitli Kart ─ */
        .dest-card.locked {
            cursor: not-allowed;
            background: var(--card-locked);
            border-color: rgba(255,255,255,0.03);
            opacity: 0.38;
        }

        .dest-card.locked .dest-name { color: var(--muted); }
        .dest-card.locked .dest-desc { color: var(--done-text); }
        .dest-card.locked .dest-emoji { filter: grayscale(0.8); }

        /* Tamamlandı / Kilitli rozeti */
        .done-badge {
            display: none;
            font-size: 0.7rem;
            color: #3d8c4c;
            background: rgba(60,180,80,0.12);
            border: 1px solid rgba(60,180,80,0.25);
            border-radius: 6px;
            padding: 3px 8px;
            white-space: nowrap;
        }
        .dest-card.done .done-badge { display: inline-block; }

        .locked-badge {
            display: none;
            font-size: 0.68rem;
            color: var(--muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 3px 8px;
            white-space: nowrap;
        }
        .dest-card.locked .locked-badge { display: inline-block; }

        .dest-card.done .leg-count,
        .dest-card.done .dest-check  { display: none; }
        .dest-card.locked .leg-count { display: none; }
        .dest-card.locked .dest-check { display: none; }

        /* Görev numarası chip */
        .task-chip {
            position: absolute;
            top: 10px; right: 12px;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 2px 7px;
            letter-spacing: 0.05em;
        }

        .dest-emoji { font-size: 1.9rem; flex-shrink: 0; }
        .dest-info  { flex: 1; min-width: 0; }

        .dest-name {
            font-size: 0.98rem;
            font-weight: 700;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 60px; /* task-chip'i aşma */
        }

        .dest-desc { font-size: 0.75rem; color: var(--muted); }

        .dest-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .leg-count {
            font-size: 0.72rem;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 3px 8px;
        }

        .dest-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.14);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            color: transparent;
            transition: all 0.2s;
        }

        .dest-card.selected .dest-check {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* Sıradaki durak etiketi */
        .next-label {
            display: none;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 8px;
            white-space: nowrap;
        }
        .dest-card.active-next .next-label { display: inline-block; }
        .dest-card.active-next .leg-count  { display: none; }

        /* ── Başlat Butonu ──────────────────────── */
        .bottom-bar {
            position: sticky;
            bottom: 0; left: 0; right: 0;
            padding: 18px 24px 36px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            z-index: 10;
        }

        #start-btn {
            width: 100%;
            padding: 17px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: opacity 0.2s, transform 0.15s;
        }

        #start-btn:disabled {
            opacity: 0.28;
            cursor: not-allowed;
            box-shadow: none;
        }

        #start-btn:not(:disabled):active { transform: scale(0.97); }

        /* ── Filigran ───────────────────────────── */
        .watermark {
            position: fixed;
            bottom: 8px; right: 10px;
            font-size: 0.62rem;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Kilitli uyarı toast ────────────────── */
        #lock-toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1E2530;
            border: 1px solid rgba(255,180,0,0.3);
            color: #FFD580;
            font-size: 0.82rem;
            padding: 10px 18px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }

        #lock-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <span class="header-icon">🏥</span>
        <h1>Hastane AR Navigasyon</h1>
        <p class="header-sub">Artırılmış Gerçeklik Yönlendirme Sistemi</p>
    </header>

    <!-- AR Destek Durumu -->
    <div id="ar-badge">
        <div class="badge-dot"></div>
        <span id="ar-badge-text">AR desteği kontrol ediliyor...</span>
    </div>

    <!-- Görev İlerleme -->
    <div class="progress-bar-wrap">
        <div class="progress-label">
            <span>Görev İlerlemesi</span>
            <span id="progress-text">0 / 4 Tamamlandı</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <p class="section-label">Hedef Seçin</p>

    <div id="dest-list"></div>

    <div class="bottom-bar">
        <button id="start-btn" disabled>Hedef seçin</button>
    </div>

    <div id="lock-toast">🔒 Önce sıradaki durağı tamamlayın</div>

    <div class="watermark">by Arda24</div>

    <script>
    /**
     * index.html — Sıralı Durak Seçimi
     *
     * - Duraklar sırayla açılır; önceki tamamlanmadan sonraki kilitli.
     * - Tamamlananlar en alta taşınır, tıklanamaz.
     * - Durum sessionStorage'da tutulur → sekme/tarayıcı kapanınca sıfırlanır.
     */

    const STORAGE_KEY = 'ar_completed_routes';

    function loadCompleted() {
        try {
            const raw = sessionStorage.getItem(STORAGE_KEY);
            return new Set(raw ? JSON.parse(raw) : []);
        } catch { return new Set(); }
    }

    function saveCompleted(set) {
        try {
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
        } catch {}
    }

    // ar.html'den ?done=ID ile dönüş kontrolü
    (function checkReturnFromAR() {
        const params = new URLSearchParams(window.location.search);
        const doneId = params.get('done');
        if (!doneId) return;
        const completed = loadCompleted();
        completed.add(doneId);
        saveCompleted(completed);
        history.replaceState(null, '', 'index.html');
    })();

    const completed = loadCompleted();
    let selected    = null;

    // Sıralama: order alanına göre
    const sortedRoutes = [...NAV_ROUTES].sort((a, b) => a.order - b.order);

    // Sıradaki aktif durak (tamamlanmamış ilk durak)
    const nextUnlocked = sortedRoutes.find(r => !completed.has(r.id));
    const nextId       = nextUnlocked ? nextUnlocked.id : null;

    // Kart durumu hesapla
    function getCardState(route) {
        if (completed.has(route.id)) return 'done';
        if (route.id === nextId)     return 'next';   // seçilebilir
        return 'locked';
    }

    const activeCards = [];   // seçilebilir
    const doneCards   = [];   // tamamlanmış (en alta)

    sortedRoutes.forEach(route => {
        const state      = getCardState(route);
        const isDone     = state === 'done';
        const isLocked   = state === 'locked';
        const isNext     = state === 'next';
        const arLegCount = route.legs.filter(l => l.type === 'ar').length;

        const card = document.createElement('div');
        card.className  = 'dest-card'
            + (isDone   ? ' done'        : '')
            + (isLocked ? ' locked'      : '')
            + (isNext   ? ' active-next' : '');
        card.dataset.id = route.id;

        card.innerHTML = `
            <div class="task-chip">GÖREV ${route.task}</div>
            <div class="dest-emoji">${route.icon}</div>
            <div class="dest-info">
                <div class="dest-name">${route.name}</div>
                <div class="dest-desc">${route.desc}</div>
            </div>
            <div class="dest-right">
                <div class="leg-count">${arLegCount} durak</div>
                <div class="next-label">▶ Sıradaki</div>
                <div class="done-badge">✓ Rota Tamamlandı</div>
                <div class="locked-badge">🔒 Kilitli</div>
                <div class="dest-check">✓</div>
            </div>
        `;

        if (isNext) {
            card.addEventListener('click', () => selectCard(route.id, card, route));
            activeCards.push(card);
        } else if (isLocked) {
            card.addEventListener('click', showLockToast);
        } else {
            // done
            doneCards.push(card);
        }
    });

    const listEl = document.getElementById('dest-list');
    activeCards.forEach(c => listEl.appendChild(c));
    // Kilitli kartları da aktif bölümde göster (ama tıklanamaz)
    sortedRoutes
        .filter(r => getCardState(r) === 'locked')
        .forEach(r => {
            const el = document.querySelector(`.dest-card[data-id="${r.id}"]`);
            if (el) listEl.appendChild(el);
        });
    doneCards.forEach(c => listEl.appendChild(c));

    // Kilitli kartlar henüz DOM'a eklenmemiş olabilir (forEach içinde oluşturuldu ama listeye eklenmedi)
    // Tekrar doğru sırayla ekleyelim
    listEl.innerHTML = '';
    sortedRoutes.forEach(route => {
        const state = getCardState(route);
        const el = document.querySelector(`.dest-card[data-id="${route.id}"]`);
        if (!el) return;
        if (state === 'done') return; // done'lar en sona
        listEl.appendChild(el);
    });
    doneCards.forEach(c => listEl.appendChild(c));

    // ── Görev ilerleme barını güncelle ───────────────────
    function updateProgress() {
        const total = NAV_ROUTES.length;
        const done  = completed.size;
        const pct   = Math.round((done / total) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = `${done} / ${total} Tamamlandı`;
    }
    updateProgress();

    // ── Kart seçimi ───────────────────────────────────────
    function selectCard(id, cardEl, route) {
        document.querySelectorAll('.dest-card.active-next').forEach(c => c.classList.remove('selected'));
        cardEl.classList.add('selected');
        selected = id;

        const btn = document.getElementById('start-btn');
        btn.disabled    = false;
        btn.textContent = `🚀  ${route.name}'e Git`;
    }

    // ── Kilitli uyarısı ───────────────────────────────────
    let toastTimer = null;
    function showLockToast() {
        const toast = document.getElementById('lock-toast');
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── AR Destek Kontrolü ────────────────────────────────
    const badge     = document.getElementById('ar-badge');
    const badgeText = document.getElementById('ar-badge-text');

    if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then(ok => {
            badge.className = 'ok';
            badgeText.textContent = ok
                ? '✅ ARCore hazır'
                : '⚠️ AR sınırlı — yine de deneyin';
        }).catch(() => {
            badge.className = 'fail';
            badgeText.textContent = '⚠️ AR kontrolü başarısız';
        });
    } else {
        badge.className = 'fail';
        badgeText.textContent = '❌ WebXR bulunamadı (Chrome + HTTPS gerekli)';
    }

    // ── Başlat ────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
        if (!selected) return;
        sessionStorage.setItem('ar_hedef', selected);
        window.location.href = `ar.html?hedef=${selected}`;
    });
    </script>
</body>
</html>
