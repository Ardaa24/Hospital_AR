<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hastane AR Navigasyon</title>
    <script src="config.js"></script>
    <style>
        :root {
            --accent: #81D4FA;
            --accent-glow: rgba(129,212,250,0.3);
            --bg: #0D1117;
            --card: #161C26;
            --border: rgba(129,212,250,0.2);
            --text: #E6EDF3;
            --muted: #768390;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Arka plan ışıma */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 60vh;
            background: radial-gradient(ellipse, rgba(129,212,250,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        header {
            padding: 48px 24px 24px;
            text-align: center;
        }

        .hospital-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
        }

        /* AR Destek Durumu */
        #ar-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 24px 28px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            transition: all 0.3s;
        }
        #ar-badge.ok   { background: rgba(129,212,250,0.1); color: var(--accent); border: 1px solid var(--border); }
        #ar-badge.fail { background: rgba(239,100,100,0.1); color: #F97583; border: 1px solid rgba(239,100,100,0.3); }
        .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

        /* Hedef kartları */
        .dest-label {
            padding: 0 24px 12px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        #dest-list {
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dest-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            background: var(--card);
            border: 1.5px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .dest-card.active {
            border-color: var(--accent);
            background: rgba(129,212,250,0.06);
        }

        .dest-card:active { opacity: 0.8; }

        .dest-emoji {
            font-size: 1.8rem;
            width: 44px;
            text-align: center;
            flex-shrink: 0;
        }

        .dest-info { flex: 1; }

        .dest-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .dest-legs {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .dest-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            color: transparent;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .dest-card.active .dest-check {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* Başlat butonu */
        .bottom-bar {
            padding: 20px 24px 36px;
            position: sticky;
            bottom: 0;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
        }

        #start-btn {
            width: 100%;
            padding: 17px;
            font-size: 1.05rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: opacity 0.2s, transform 0.15s;
        }

        #start-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
        }

        #start-btn:not(:disabled):active { transform: scale(0.97); }

        .watermark {
            position: fixed;
            bottom: 8px; right: 10px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.12);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <span class="hospital-icon">🏥</span>
        <h1>AR Navigasyon</h1>
        <p class="subtitle">Hastane Yönlendirme Sistemi</p>
    </header>

    <div id="ar-badge">
        <div class="badge-dot"></div>
        <span id="ar-badge-text">AR desteği kontrol ediliyor...</span>
    </div>

    <p class="dest-label">Nereye gitmek istiyorsunuz?</p>
    <div id="dest-list"></div>

    <div class="bottom-bar">
        <button id="start-btn" disabled>Hedef seçin</button>
    </div>

    <div class="watermark">by Arda24</div>

    <script>
        let selected = null;

        // ── Hedefleri listele ────────────────────────────────
        Object.entries(NavConfig).forEach(([id, data]) => {
            const card = document.createElement('div');
            card.className = 'dest-card';
            card.innerHTML = `
                <div class="dest-emoji">${data.icon}</div>
                <div class="dest-info">
                    <div class="dest-name">${data.name}</div>
                    <div class="dest-legs">${data.legs.length} durak</div>
                </div>
                <div class="dest-check">✓</div>
            `;
            card.addEventListener('click', () => {
                document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selected = id;
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.textContent = `🚀 ${data.name}'e Git`;
            });
            document.getElementById('dest-list').appendChild(card);
        });

        // ── AR Destek Kontrolü ───────────────────────────────
        const badge = document.getElementById('ar-badge');
        const badgeText = document.getElementById('ar-badge-text');

        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-ar').then(ok => {
                badge.className = 'ok';
                badgeText.textContent = ok
                    ? '✅ ARCore hazır — başlayabilirsiniz'
                    : '⚠️ ARCore desteklenmiyor, görünüm sınırlı olabilir';
            }).catch(() => {
                badge.className = 'fail';
                badgeText.textContent = '⚠️ AR kontrolü başarısız';
            });
        } else {
            badge.className = 'fail';
            badgeText.textContent = '❌ WebXR bulunamadı — Chrome + HTTPS gerekli';
        }

        // ── Başlat ───────────────────────────────────────────
        document.getElementById('start-btn').addEventListener('click', () => {
            if (!selected) return;
            // Hedefi URL'e ve localStorage'a yaz
            localStorage.setItem('ar_hedef', selected);
            window.location.href = `ar.html?hedef=${selected}`;
        });
    </script>
</body>
</html>
