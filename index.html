<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hastane AR Navigasyon</title>
    <script src="config.js"></script>
    <style>
        :root {
            --accent:     #81D4FA;
            --accent-dim: rgba(129,212,250,0.12);
            --accent-glow:rgba(129,212,250,0.28);
            --bg:         #0D1117;
            --card:       #161C26;
            --card-done:  #111418;
            --border:     rgba(129,212,250,0.2);
            --text:       #E6EDF3;
            --muted:      #6B7A8D;
            --done-text:  #3A4450;
            --radius:     16px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Sayfadan taşmayı önle */
            overflow-x: hidden;
        }

        /* Arka plan ışıması */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: 50%;
            transform: translateX(-50%);
            width: 100vw; height: 50vh;
            background: radial-gradient(ellipse, rgba(129,212,250,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ───────────────────────────── */
        header {
            position: relative;
            z-index: 1;
            padding: 52px 24px 20px;
            text-align: center;
        }

        .header-icon { font-size: 2.6rem; display: block; margin-bottom: 10px; }

        h1 { font-size: 1.45rem; font-weight: 700; margin-bottom: 4px; }

        .header-sub { font-size: 0.82rem; color: var(--muted); }

        /* AR Destek badge */
        #ar-badge {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 8px;
            margin: 4px 24px 20px;
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 0.78rem;
            background: rgba(255,255,255,0.03);
            color: var(--muted);
            transition: all 0.3s;
        }
        #ar-badge.ok   { background: rgba(129,212,250,0.09); color: var(--accent); border: 1px solid var(--border); }
        #ar-badge.fail { background: rgba(239,100,100,0.09); color: #F97583; border: 1px solid rgba(239,100,100,0.3); }
        .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

        /* ── Görev İlerleme ────────────────────── */
        .progress-bar-wrap {
            position: relative; z-index: 1;
            margin: 0 24px 20px;
            padding: 14px 16px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label span:first-child {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .progress-label span:last-child {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ── Kart Listesi ──────────────────────── */
        .section-label {
            position: relative; z-index: 1;
            padding: 0 24px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        #dest-list {
            position: relative; z-index: 1;
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Tamamlananlar en alta gittiğinde ani kayma engellenir */
        }

        /* ─ Aktif Kart ─ */
        .dest-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px;
            background: var(--card);
            border: 1.5px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        /* Seçili kart parlama efekti */
        .dest-card.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .dest-card.selected::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .dest-card:active:not(.done) { opacity: 0.75; }

        /* ─ Tamamlanmış Kart ─ */
        .dest-card.done {
            cursor: default;
            background: var(--card-done);
            border-color: rgba(255,255,255,0.04);
            opacity: 0.55;
        }

        .dest-card.done .dest-name  { color: var(--done-text); }
        .dest-card.done .dest-desc  { color: var(--done-text); }
        .dest-card.done .dest-emoji { filter: grayscale(1); }

        /* Tamamlandı rozeti */
        .done-badge {
            display: none;
            font-size: 0.7rem;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 3px 8px;
            white-space: nowrap;
        }
        .dest-card.done .done-badge { display: inline-block; }
        .dest-card.done .leg-count  { display: none; }
        .dest-card.done .dest-check { display: none; }

        /* Görev numarası chip */
        .task-chip {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 2px 7px;
            letter-spacing: 0.05em;
        }

        .dest-emoji { font-size: 1.9rem; flex-shrink: 0; }

        .dest-info  { flex: 1; min-width: 0; }

        .dest-name  {
            font-size: 0.98rem;
            font-weight: 700;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dest-desc  { font-size: 0.75rem; color: var(--muted); }

        .dest-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }

        .leg-count  {
            font-size: 0.72rem;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 3px 8px;
        }

        .dest-check {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.14);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            color: transparent;
            transition: all 0.2s;
        }

        .dest-card.selected .dest-check {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* ── Başlat Butonu ─────────────────────── */
        .bottom-bar {
            position: sticky;
            bottom: 0; left: 0; right: 0;
            padding: 18px 24px 36px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            z-index: 10;
        }

        #start-btn {
            width: 100%;
            padding: 17px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: opacity 0.2s, transform 0.15s;
        }

        #start-btn:disabled {
            opacity: 0.28;
            cursor: not-allowed;
            box-shadow: none;
        }

        #start-btn:not(:disabled):active { transform: scale(0.97); }

        /* ── Filigran ──────────────────────────── */
        .watermark {
            position: fixed;
            bottom: 8px; right: 10px;
            font-size: 0.62rem;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <header>
        <span class="header-icon">🏥</span>
        <h1>Hastane AR Navigasyon</h1>
        <p class="header-sub">Artırılmış Gerçeklik Yönlendirme Sistemi</p>
    </header>

    <!-- AR Destek Durumu -->
    <div id="ar-badge">
        <div class="badge-dot"></div>
        <span id="ar-badge-text">AR desteği kontrol ediliyor...</span>
    </div>

    <!-- Görev İlerleme -->
    <div class="progress-bar-wrap">
        <div class="progress-label">
            <span>Görev İlerlemesi</span>
            <span id="progress-text">0 / 4 Tamamlandı</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <p class="section-label">Hedef Seçin</p>

    <div id="dest-list"></div>

    <div class="bottom-bar">
        <button id="start-btn" disabled>Hedef seçin</button>
    </div>

    <div class="watermark">by Arda24</div>

    <script>
    /**
     * index.html scripti
     *
     * Tamamlanma durumu sessionStorage'da tutulur.
     * sessionStorage → sekme/tarayıcı kapanınca otomatik sıfırlanır.
     * localStorage gibi kalıcı DEĞİLDİR — istenen davranış bu.
     */

    const STORAGE_KEY = 'ar_completed_routes';

    // ── Tamamlanan rotaları yükle (Set olarak) ───────────
    function loadCompleted() {
        try {
            const raw = sessionStorage.getItem(STORAGE_KEY);
            return new Set(raw ? JSON.parse(raw) : []);
        } catch { return new Set(); }
    }

    // ── Tamamlananları kaydet ─────────────────────────────
    function saveCompleted(set) {
        try {
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
        } catch {}
    }

    // ── Dışarıdan erişim: ar.html yönlendirmesi sonrası ──
    // ar.html tamamlanınca ?done=ID ile geri döner
    (function checkReturnFromAR() {
        const params    = new URLSearchParams(window.location.search);
        const doneId    = params.get('done');
        if (!doneId) return;

        const completed = loadCompleted();
        completed.add(doneId);
        saveCompleted(completed);

        // URL'i temizle (geri tuşu sorununu önle)
        history.replaceState(null, '', 'index.html');
    })();

    // ── Kartları oluştur ──────────────────────────────────
    const completed  = loadCompleted();
    let   selected   = null;

    const activeCards = [];
    const doneCards   = [];

    NAV_ROUTES.forEach(route => {
        const isDone = completed.has(route.id);

        const card = document.createElement('div');
        card.className = 'dest-card' + (isDone ? ' done' : '');
        card.dataset.id = route.id;

        // AR leg sayısı (sadece "ar" tipindekiler)
        const arLegCount = route.legs.filter(l => l.type === 'ar').length;

        card.innerHTML = `
            <div class="task-chip">GÖREV ${route.task}</div>
            <div class="dest-emoji">${route.icon}</div>
            <div class="dest-info">
                <div class="dest-name">${route.name}</div>
                <div class="dest-desc">${route.desc}</div>
            </div>
            <div class="dest-right">
                <div class="leg-count">${arLegCount} durak</div>
                <div class="done-badge">✓ Rota Tamamlandı</div>
                <div class="dest-check">✓</div>
            </div>
        `;

        if (!isDone) {
            card.addEventListener('click', () => selectCard(route.id, card, route));
            activeCards.push(card);
        } else {
            doneCards.push(card);
        }

        // Sıralama: önce aktifler, sonra tamamlananlar
        // (appendChild sırasında ayarlanır)
    });

    const listEl = document.getElementById('dest-list');

    // Önce aktif kartları ekle
    activeCards.forEach(c => listEl.appendChild(c));
    // Sonra tamamlananları ekle (en alta)
    doneCards.forEach(c => listEl.appendChild(c));

    // ── Görev ilerleme barını güncelle ───────────────────
    function updateProgress() {
        const total  = NAV_ROUTES.length;
        const done   = completed.size;
        const pct    = Math.round((done / total) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = `${done} / ${total} Tamamlandı`;
    }
    updateProgress();

    // ── Kart seçimi ───────────────────────────────────────
    function selectCard(id, cardEl, route) {
        document.querySelectorAll('.dest-card:not(.done)').forEach(c => c.classList.remove('selected'));
        cardEl.classList.add('selected');
        selected = id;

        const btn = document.getElementById('start-btn');
        btn.disabled    = false;
        btn.textContent = `🚀  ${route.name}'e Git`;
    }

    // ── AR Destek Kontrolü ────────────────────────────────
    const badge     = document.getElementById('ar-badge');
    const badgeText = document.getElementById('ar-badge-text');

    if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then(ok => {
            badge.className = 'ok';
            badgeText.textContent = ok
                ? '✅ ARCore hazır'
                : '⚠️ AR sınırlı — yine de deneyin';
        }).catch(() => {
            badge.className = 'fail';
            badgeText.textContent = '⚠️ AR kontrolü başarısız';
        });
    } else {
        badge.className = 'fail';
        badgeText.textContent = '❌ WebXR bulunamadı (Chrome + HTTPS gerekli)';
    }

    // ── Başlat ────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
        if (!selected) return;
        sessionStorage.setItem('ar_hedef', selected);
        window.location.href = `ar.html?hedef=${selected}`;
    });
    </script>
</body>
</html>
